<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel de Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button onclick="logout()" class="btn-logout">
        ⏻ Logout
    </button>



    <section class="section">
        <h2>📦 Painel de Pedidos</h2>
        <h3 id="resumo-dia">📊 Pedidos concluídos hoje: 0</h3>
        <div class="kanban">

            <div class="coluna">
                <h3>📥 Recebidos</h3>
                <div id="recebidos"></div>
            </div>

            <div class="coluna">
                <h3>🍳 Preparação</h3>
                <div id="preparacao"></div>
            </div>

            <div class="coluna">
                <h3>🚚 Enviados</h3>
                <div id="enviados"></div>
            </div>
            <div class="coluna">
                <h3>🗺️ Rotas de Entregas</h3>
                <div id="rotas"></div>
            </div>
            <div class="coluna">
                <h3>💬 Chats</h3>
                <div id="lista-chats"></div>

                <div id="chat-admin-box" style="margin-top:10px;">
                    <div id="chat-admin-mensagens"></div>

                    <input id="admin-input" placeholder="Responder...">
                    <button onclick="responderChat()">Enviar</button>
                    <button onclick="encerrarChat()" class="btn-encerrar-chat">
  ❌ Encerrar Chat
</button>

                </div>
            </div>



        </div>

        </div>
    </section>

    <script src="admin.js"></script>

</body>

</html>
